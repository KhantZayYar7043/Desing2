<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Crazy</title> 

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #060608; color: #f4f4f5; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Luxury Gold Animated Theme */
        :root {
            --gold-primary: #ffd700;
            --gold-light: #fff3a8;
            --gold-dark: #b8860b;
            --dark-surface: #0f0f12;
            --card-surface: #141417;
        } 

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #060608; }
        ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; } 

        @keyframes goldRun {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        } 

        /* Header */
        header { 
            background-color: var(--dark-surface); 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }
        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #b8860b, #ffd700, #fff3a8, #b8860b, #ffd700);
            background-size: 300% 100%;
            animation: goldRun 4s linear infinite;
        } 

        /* --- 🌊 Text One-by-One Wave Animation Like Requested --- */
        .logo { 
            display: flex;
            cursor: pointer; 
            user-select: none;
        }
        .logo span { 
            font-size: 24px; 
            font-weight: 900; 
            display: inline-block;
            letter-spacing: 1px;
            /* Shimmer Gold Gradient Base */
            background: linear-gradient(to bottom, #fff3a8, #ffd700, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Wave Animation: Vertical jump and Glow change */
            animation: textWave 2s ease-in-out infinite;
            /* Multiplies delay via JS below */
            animation-delay: calc(0.1s * var(--i));
        }
        /* Space spacing for "Midnight" and "Crazy" */
        .logo span.space {
            width: 8px;
        } 

        @keyframes textWave {
            0%, 100% {
                transform: translateY(0);
                filter: drop-shadow(0 0 2px rgba(255,215,0,0.2));
            }
            50% {
                transform: translateY(-8px); /* စာလုံးတစ်လုံးချင်း အပေါ်သို့ ကြွတက်မယ့်အမြင့် */
                filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.8)) drop-shadow(0 0 15px rgba(255,243,168,0.5));
            }
        }
        
        .search-box { display: flex; background: #222226; border-radius: 30px; padding: 3px 5px; width: 45%; max-width: 350px; border: 1px solid rgba(255,255,255,0.05); }
        .search-box input { 
            width: 100%; 
            padding: 6px 12px; 
            border: none; 
            background: transparent; 
            color: #fff; 
            outline: none;
            font-size: 13px;
        }
        .search-box button { 
            padding: 6px 18px; 
            border: none; 
            background: linear-gradient(135deg, #fff3a8, #ffd700, #b8860b); 
            background-size: 200% auto;
            animation: goldRun 3s linear infinite;
            color: #000; 
            border-radius: 25px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 13px;
        } 

        /* Container */
        .container { display: flex; flex: 1; position: relative; }
        
        /* Sidebar Menu */
        aside { 
            width: 240px; 
            background-color: #0b0b0e; 
            padding: 20px 12px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            border-right: 1px solid rgba(255,255,255,0.02);
        }
        aside button { 
            background: transparent; 
            border: none; 
            color: #a1a1aa; 
            text-align: left; 
            padding: 12px 15px; 
            font-size: 14px; 
            font-weight: 500;
            cursor: pointer; 
            border-radius: 6px; 
            transition: all 0.2s ease;
        }
        aside button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }
        aside button.active { 
            color: #000;
            font-weight: 700;
            background: linear-gradient(90deg, #fff3a8, #ffd700, #b8860b);
            background-size: 200% auto;
            animation: goldRun 3s linear infinite;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.15);
        } 

        /* Main Content */
        main { flex: 1; padding: 20px; background-color: #060608; }
        
        /* Video Grid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 16px; 
        }
        
        /* Video Card with Replit UI Style Corners */
        .card { 
            background: var(--card-surface); 
            border-radius: 16px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            border: 1px solid rgba(255,255,255,0.04);
            display: flex;
            flex-direction: column;
        }
        .card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 12px rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.25);
        }
        
        .thumb-container { 
            width: 100%; 
            aspect-ratio: 16/10; 
            background: #000; 
            position: relative; 
            overflow: hidden;
            border-radius: 16px 16px 0 0;
        }
        .thumb-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .duration { 
            position: absolute; 
            bottom: 8px; 
            right: 8px; 
            background: rgba(0, 0, 0, 0.75); 
            padding: 2px 6px; 
            font-size: 11px; 
            border-radius: 6px; 
            color: #fff; 
            font-weight: 600;
        }
        
        .info { padding: 12px; display: flex; flex-direction: column; gap: 4px; }
        .video-title { 
            font-size: 13.5px; 
            font-weight: 500; 
            line-height: 1.4; 
            height: 38px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            color: #efeff1;
        }
        .card:hover .video-title { color: #ffd700; }
        .views { font-size: 11.5px; color: #9a9a9a; } 

        /* Watch Section */
        #watchSection { display: none; width: 100%; max-width: 900px; margin: 0 auto; }
        .back-btn { 
            background: #141416; 
            color: #e4e4e7; 
            border: 1px solid rgba(255,255,255,0.08); 
            padding: 8px 18px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 13px;
            margin-bottom: 20px; 
            display: inline-block; 
        }
        .back-btn:hover { background: #fff; color: #000; }
        .player-container { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 215, 0, 0.1);
        }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        .watch-title { font-size: 18px; font-weight: 600; margin-top: 15px; color: #fff; } 

        /* VIP Banner */
        .vip-neon-box {
            margin-top: 25px;
            padding: 22px;
            background: linear-gradient(135deg, #0f0f12, #17171c);
            border-radius: 12px;
            text-align: center;
            position: relative;
        }
        .vip-neon-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 12px; padding: 1px;
            background: linear-gradient(90deg, #b8860b, #ffd700, #fff3a8, #b8860b); background-size: 300% 100%; animation: goldRun 3s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        } 

        .vip-neon-text { font-size: 14px; line-height: 1.7; color: #d4d4d8; margin-bottom: 18px; }
        .vip-neon-text span.highlight { color: #fff3a8; font-weight: bold; border-bottom: 1px dashed #ffd700; }
        .vip-neon-text span.price {
            background: linear-gradient(to right, #fff, #ffd700, #fff3a8); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: goldRun 3s linear infinite;
            font-weight: 800; font-size: 18px;
        } 

        .vip-btn {
            display: inline-block; padding: 12px 45px; font-size: 14px; font-weight: 800; color: #000; text-decoration: none; border-radius: 6px;
            background: linear-gradient(-45deg, #ffd700, #fff, #b8860b, #ffd700); background-size: 300% 300%; animation: goldRun 3s linear infinite;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); transition: transform 0.2s;
        }
        .vip-btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); } 

        /* Load More Button */
        .load-more-btn { 
            display: block; width: 180px; margin: 30px auto; padding: 12px; background: #141416; color: #fff; 
            border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; 
        }
        .load-more-btn:hover { background: #fff; color: #000; } 

        /* Warning Modal Popup */
        .modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 3, 5, 0.95); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--dark-surface); padding: 35px 25px; border-radius: 12px; max-width: 400px; text-align: center; position: relative; }
        .modal-content::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 12px; padding: 1.5px;
            background: linear-gradient(90deg, #ffd700, #b8860b, #ffd700); background-size: 200% 100%; animation: goldRun 3s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        }
        .modal-content h2 { color: #ffd700; margin-bottom: 10px; font-size: 20px; }
        .modal-content p { font-size: 13.5px; line-height: 1.6; margin-bottom: 22px; color: #a1a1aa; }
        .modal-content button { 
            background: linear-gradient(135deg, #fff3a8, #ffd700, #b8860b); background-size: 200% auto; animation: goldRun 3s linear infinite;
            color: #000; border: none; padding: 10px 40px; font-size: 14px; font-weight: 700; border-radius: 6px; cursor: pointer; outline: none;
        } 

        /* Responsive UI Mobile - Replit Grid Layout */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            aside { width: 100%; flex-direction: row; overflow-x: auto; padding: 8px; gap: 6px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.03); }
            aside button { padding: 6px 12px; font-size: 12.5px; shrink: 0; white-space: nowrap; border-radius: 6px; }
            aside button.active { border-radius: 6px; box-shadow: none; }
            .search-box { width: 50%; }
            main { padding: 12px; }
            
            .grid { 
                grid-template-columns: repeat(2, 1fr) !important; 
                gap: 12px; 
            }
            .card { border-radius: 12px; }
            .thumb-container { border-radius: 12px 12px 0 0; }
            .video-title { font-size: 12px; height: 34px; line-height: 1.4; margin-bottom: 2px; }
            .views { font-size: 10.5px; }
            .duration { font-size: 10px; padding: 1px 4px; border-radius: 4px; bottom: 6px; right: 6px; }
        }
    </style>

    <script>
        const API_BASE = 'https://www.eporner.com/api/v2/video/search/';
        let page = 1;
        let currentQuery = 'myanmar';
        const perPage = 24; 

        const videoGrid = document.getElementById('videoGrid');
        const gallerySection = document.getElementById('gallerySection');
        const watchSection = document.getElementById('watchSection');
        const videoPlayer = document.getElementById('videoPlayer');
        const videoTitle = document.getElementById('videoTitle');
        const loadMoreBtn = document.getElementById('loadMoreBtn'); 

        // --- JavaScript Automatic Letter Splitting Logic for Wave Effect ---
        function createWaveLogo() {
            const logoText = "Midnight Crazy";
            const container = document.getElementById('animatedLogo');
            container.innerHTML = ''; // Reset container
            
            logoText.split('').forEach((letter, index) => {
                const span = document.createElement('span');
                if (letter === ' ') {
                    span.className = 'space';
                    span.innerHTML = '&nbsp;';
                } else {
                    span.textContent = letter;
                }
                span.style.setProperty('--i', index + 1);
                container.appendChild(span);
            });
        }
        createWaveLogo(); 

        function closeModal() {
            localStorage.setItem('midnightcrazy:agree', '1');
            document.getElementById('entryModal').style.display = 'none';
        } 

        if (localStorage.getItem('midnightcrazy:agree') === '1') {
            document.getElementById('entryModal').style.display = 'none';
        } 

        function getRandomPage() {
            return Math.floor(Math.random() * 15) + 1;
        } 

        async function fetchVideos(query = 'myanmar', append = false) {
            if (!append) { 
                page = getRandomPage();
                videoGrid.innerHTML = '<p style="padding:20px; color:var(--gold-primary); font-weight:600; font-size:14px;">ဗီဒီယိုများ အသစ်ပြောင်းလဲဆွဲယူနေပါသည်...</p>'; 
            }
            try {
                const searchKeyword = query ? query : 'myanmar';
                const url = `${API_BASE}?query=${encodeURIComponent(searchKeyword)}&per_page=${perPage}&page=${page}&thumbsize=big`;
                const res = await fetch(url);
                const data = await res.json(); 

                if (!append) videoGrid.innerHTML = ''; 

                if (data && data.videos && data.videos.length > 0) {
                    let shuffledVideos = data.videos.sort(() => Math.random() - 0.5);
                    renderCards(shuffledVideos);
                    loadMoreBtn.style.display = 'block';
                } else {
                    if (!append) videoGrid.innerHTML = '<p style="padding:20px; color:#71717a; font-size:14px;">ဗီဒီယို ရှာမတွေ့ပါ။</p>';
                    loadMoreBtn.style.display = 'none';
                }
            } catch (err) {
                console.error(err);
                if (!append) videoGrid.innerHTML = '<p style="padding:20px; color:var(--gold-primary); font-size:14px;">Error: အချက်အလက်ယူလို့မရပါ။ VPN ဖွင့်ထားဖို့ လိုအပ်ပါသည်။</p>';
            }
        } 

        function renderCards(videos) {
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'card';
                const imgUrl = v.default_thumb ? v.default_thumb.src : (v.thumbs && v.thumbs.length > 0 ? v.thumbs[0].src : ''); 

                card.innerHTML = `
                    <div class="thumb-container">
                        <img src="${imgUrl}" alt="${v.title}" loading="lazy">
                        <span class="duration">${v.length_min || '00'}:${v.length_sec || '00'}</span>
                    </div>
                    <div class="info">
                        <div class="video-title">${v.title}</div>
                        <div class="views">👁️ ${parseInt(v.views).toLocaleString()}</div>
                    </div>
                `;
                card.onclick = () => openWatchPage(v.embed, v.title);
                videoGrid.appendChild(card);
            });
        } 

        function openWatchPage(embedUrl, title) {
            gallerySection.style.display = 'none';
            watchSection.style.display = 'block';
            videoPlayer.src = embedUrl;
            videoTitle.innerText = title;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } 

        function goHome() {
            watchSection.style.display = 'none';
            videoPlayer.src = '';
            gallerySection.style.display = 'block';
        } 

        function filterCategory(cat, btn) {
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentQuery = cat;
            goHome();
            fetchVideos(currentQuery, false);
        } 

        function handleSearch() {
            const val = document.getElementById('searchInput').value.trim();
            currentQuery = val;
            goHome();
            fetchVideos(currentQuery, false);
        } 

        function loadMore() {
            page++;
            fetchVideos(currentQuery, true);
        } 

        fetchVideos('myanmar', false);
    </script>
